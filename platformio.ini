; PlatformIO Project Configuration File
; ESP32-S3 Modbus RTU Gateway with CAN bus (ISO-1050 transceiver, ESP32 TWAI controller)

[env:esp32-s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Serial monitor
monitor_speed = 115200

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; CAN bus (TWAI) pin assignments for ISO-1050 transceiver
    -DCAN_TX_PIN=GPIO_NUM_5
    -DCAN_RX_PIN=GPIO_NUM_4

; Libraries
lib_deps =
    ; NMEA 2000 core library
    ttlappalainen/NMEA2000 @ ^4.21.4
    ; ESP32 TWAI driver for NMEA2000
    ttlappalainen/NMEA2000_esp32 @ ^1.0.2
